<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目作品 | 王晗晗</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navigation -->
    <shared-nav active="projects"></shared-nav>

    <!-- ============================================================
    PAGE HEADER
    ============================================================ -->
    <section class="page-header">
        <div class="container">
            <h1 data-i18n="projects-title">项目作品</h1>
            <p class="subtitle" data-i18n="projects-subtitle">科研项目与实践作品</p>
        </div>
    </section>

    <!-- ============================================================
    CONTENT AREA — dynamically populated
    ============================================================ -->
    <section class="section">
        <div class="container" id="contentArea">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> <span data-i18n="loading">加载中...</span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <shared-footer></shared-footer>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/md-renderer.js"></script>

    <!-- ============================================================
    PAGE-SPECIFIC SCRIPT
    ============================================================ -->
    <script>
        (function () {
            'use strict';

            const contentArea = document.getElementById('contentArea');
            let catalog = null;

            /**
             * Get current view state from URL parameters.
             */
            function getParams() {
                const p = new URLSearchParams(window.location.search);
                return { project: p.get('project') };
            }

            /**
             * Main render function.
             * @param {string} lang
             */
            async function render(lang) {
                const params = getParams();
                lang = lang || window.currentLang || 'zh';

                if (!catalog) {
                    try {
                        catalog = await window.mdRenderer.loadCatalog('projects');
                    } catch (err) {
                        contentArea.innerHTML =
                            '<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>' +
                            window.t('load-error') + ': ' + err.message + '</p></div>';
                        return;
                    }
                }

                if (!params.project) {
                    renderProjectList(lang);
                } else {
                    await renderProjectDetail(params.project, lang);
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            /**
             * State 1: Show all projects as cards.
             */
            function renderProjectList(lang) {
                document.title = window.t('projects-title', lang) + ' | Hanhan Wang';

                const projects = [...catalog.projects].sort((a, b) => a.order - b.order);

                contentArea.innerHTML = `
                    <div class="card-grid">
                        ${projects.map((p, i) => `
                            <a href="?project=${p.slug}" class="card" style="cursor: pointer;">
                                <div class="card-img img-${(i % 6) + 1}">
                                    <i class="fas fa-code"></i>
                                </div>
                                <div class="card-info">
                                    <h4>${p.title[lang] || p.title['zh']}</h4>
                                    <p>${p.shortDesc[lang] || p.shortDesc['zh']}</p>
                                    <div class="card-tags">
                                        ${(p.tags || []).map(t => '<span>' + t + '</span>').join('')}
                                    </div>
                                    ${p.links ? `
                                        <div class="card-links" onclick="event.stopPropagation();">
                                            ${p.links.github ? '<a href="' + p.links.github + '" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>' : ''}
                                            ${p.links.demo ? '<a href="' + p.links.demo + '" target="_blank" rel="noopener"><i class="fas fa-external-link-alt"></i> Demo</a>' : ''}
                                            ${p.links.paper ? '<a href="' + p.links.paper + '" target="_blank" rel="noopener"><i class="fas fa-file-alt"></i> Paper</a>' : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            /**
             * State 2: Show project detail with rendered markdown.
             */
            async function renderProjectDetail(projectSlug, lang) {
                const project = catalog.projects.find(p => p.slug === projectSlug);
                if (!project) {
                    contentArea.innerHTML =
                        '<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>' +
                        (lang === 'zh' ? '未找到该项目' : 'Project not found') + '</p></div>';
                    return;
                }

                document.title = (project.title[lang] || project.title['zh']) + ' | Hanhan Wang';

                // Show loading
                contentArea.innerHTML = `
                    <a href="projects.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> ${window.t('back-to-projects', lang)}
                    </a>
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> ${window.t('loading', lang)}
                    </div>
                `;

                // Fetch and render markdown
                let mdHtml;
                try {
                    const result = await window.mdRenderer.renderChapter(
                        'projects', projectSlug, 'index', lang
                    );
                    mdHtml = result.html;
                } catch (err) {
                    // If no markdown, show metadata-only view
                    contentArea.innerHTML = `
                        <a href="projects.html" class="back-btn">
                            <i class="fas fa-arrow-left"></i> ${window.t('back-to-projects', lang)}
                        </a>
                        <h1 style="font-size: 2.2rem; margin-bottom: 12px;">${project.title[lang] || project.title['zh']}</h1>
                        <p style="color: var(--gray); font-size: 1.1rem; margin-bottom: 20px;">${project.description[lang] || project.description['zh']}</p>
                        ${project.tags ? '<div class="card-tags" style="margin-bottom: 25px;">' + project.tags.map(t => '<span>' + t + '</span>').join('') + '</div>' : ''}
                        ${project.links ? '<div class="card-links" style="gap: 20px; margin-top: 20px;">' +
                            (project.links.github ? '<a href="' + project.links.github + '" target="_blank" rel="noopener" class="btn"><i class="fab fa-github"></i> GitHub</a>' : '') +
                            (project.links.demo ? '<a href="' + project.links.demo + '" target="_blank" rel="noopener" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> Demo</a>' : '') +
                            (project.links.paper ? '<a href="' + project.links.paper + '" target="_blank" rel="noopener" class="btn btn-outline"><i class="fas fa-file-alt"></i> Paper</a>' : '') +
                        '</div>' : ''}
                    `;
                    return;
                }

                // Render with detail layout
                contentArea.innerHTML = `
                    <a href="projects.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> ${window.t('back-to-projects', lang)}
                    </a>
                    <div class="breadcrumb">
                        <a href="projects.html">${window.t('projects-title', lang)}</a>
                        <span class="separator">/</span>
                        <span>${project.title[lang] || project.title['zh']}</span>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 30px;">
                        ${project.tags ? project.tags.map(t => '<span style="background:#f0edff;color:var(--primary);padding:5px 14px;border-radius:20px;font-size:0.85rem;font-weight:600;">' + t + '</span>').join('') : ''}
                        <span style="flex:1;"></span>
                        ${project.links ? Object.entries(project.links).map(([label, url]) =>
                            '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--primary);font-weight:500;font-size:0.9rem;"><i class="fas fa-external-link-alt" style="margin-right:4px;"></i>' + label.charAt(0).toUpperCase() + label.slice(1) + '</a>'
                        ).join('') : ''}
                    </div>
                    <div class="md-content">${mdHtml}</div>
                `;

                if (window.hljs) {
                    contentArea.querySelectorAll('pre code').forEach(function (block) {
                        hljs.highlightElement(block);
                    });
                }
            }

            // ============================================================
            // HISTORY HANDLING — pushState on link clicks
            // ============================================================
            contentArea.addEventListener('click', function (e) {
                const link = e.target.closest('a');
                if (!link) return;

                const href = link.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('http') || link.getAttribute('target')) return;

                if (href.startsWith('?')) {
                    e.preventDefault();
                    const newParams = new URLSearchParams(href.substring(1));
                    const newUrl = window.location.pathname + '?' + newParams.toString();
                    window.history.pushState({
                        project: newParams.get('project')
                    }, '', newUrl);
                    render(window.currentLang);
                }
            });

            window.addEventListener('popstate', function () {
                render(window.currentLang);
            });

            // ============================================================
            // DYNAMIC CONTENT HANDLER
            // ============================================================
            window.dynamicContentHandler = function (lang) {
                render(lang);
            };

            // ============================================================
            // INITIAL RENDER
            // ============================================================
            render(window.currentLang);

        })();
    </script>
</body>

</html>
